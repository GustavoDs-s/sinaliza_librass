name: sinaliza
description: "Tradutor de Libras — Texto para Libras e Libras para Texto"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Navegação
  go_router: ^17.1.0

  # Firebase
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0

  # Vídeo (Texto → Libras)
  video_player: ^2.9.2

  # WebView (Avatar VLibras)
  webview_flutter: ^4.10.0

  # Câmera (Libras → Texto via Claude)
  camera: ^0.10.5+9
  permission_handler: ^11.3.0

  # API Claude
  http: ^1.2.0

  # Persistência
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Voz
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

